<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Login — Memorialize</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body data-page="login">
<header class="topbar"><div class="container nav"><a class="logo" href="index.html">MEMO<span>RIALIZE</span></a><nav class="links"><a href="index.html">Home</a><a href="about.html">About</a><a href="create-profile.html">Create Gift</a></nav></div></header>
<main class="container login-shell">
  <section class="card panel login-card">
    <span class="badge">Mock studio login</span>
    <h1 class="grad">Welcome back.</h1>
    <p class="sub" id="loginHint"></p>
    <form class="form" id="loginForm">
      <div class="field full"><label>Email</label><input id="loginEmail" type="email" required placeholder="sanskar@memorialize.in"></div>
      <div class="field full"><label>Password</label><input id="loginPassword" type="password" required placeholder="Enter demo password"></div>
      <div class="full"><button class="btn" type="submit">Sign In (Mock)</button></div>
    </form>
    <p class="sub" id="loginMessage" style="margin-top:16px"></p>
  </section>
</main>
<script src="assets/js/main.js"></script>
</body></html>

<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Create Gift Profile — Memorialize</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/css/styles.css"></head>
<body>
<header class="topbar"><div class="container nav"><a class="logo" href="index.html">MEMO<span>RIALIZE</span></a><nav class="links"><a href="index.html">Home</a><a href="ai-preview.html">AI Preview</a><a href="review-checkout.html">Checkout</a></nav></div></header>
<main class="container section">
  <h1 class="grad">Step 1: Create a gift profile</h1>
  <p class="sub">Collect personalization details to generate better AI previews.</p>
  <section class="card panel">
    <div class="stepper"><span class="active">1. Profile</span><span>2. AI Preview</span><span>3. Customize</span><span>4. Review</span><span>5. Checkout</span></div>
    <form class="form">
      <div class="field"><label>Recipient name</label><input placeholder="e.g. Dr. Priya Sharma"></div>
      <div class="field"><label>Occasion</label><select><option>Birthday</option><option>Anniversary</option><option>Farewell</option><option>Graduation</option></select></div>
      <div class="field"><label>Age group</label><select><option>18-25</option><option>26-35</option><option>36-50</option><option>50+</option></select></div>
      <div class="field"><label>Relationship</label><select><option>Friend</option><option>Partner</option><option>Parent</option><option>Colleague</option></select></div>
      <div class="field full"><label>Hobbies / interests</label><input placeholder="Music, travel, chess, fitness"></div>
      <div class="field full"><label>Reference photo URL (mock)</label><input placeholder="https://..."></div>
      <div class="field full"><label>Story prompt for AI</label><textarea placeholder="Write a short story/personality summary to generate gift concepts."></textarea></div>
    </form>
    <div style="margin-top:16px"><a class="btn" href="ai-preview.html">Generate AI Concepts</a></div>
  </section>
</main>
<footer class="footer"><div class="container">Mock front-end flow. Hook this to your backend/API next.</div></footer>
</body></html>
